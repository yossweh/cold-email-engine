<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — 0xChapo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 40px 30px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid #4a4a6a; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 28px; }
        .logo h1 { color: #e0e0e0; font-size: 1.8em; letter-spacing: 2px; }
        .logo p { color: #666; font-size: 0.9em; margin-top: 5px; }
        label { display: block; color: #888; margin-bottom: 5px; margin-top: 15px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 12px 15px; background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; font-size: 14px; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #4a4a6a; }
        .btn { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #2a2a3e, #3a3a5e); color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; border: 1px solid #4a4a6a; cursor: pointer; font-size: 16px; margin-top: 25px; text-align: center; transition: all 0.2s; }
        .btn:hover { background: linear-gradient(135deg, #3a3a4e, #4a4a6e); border-color: #6a6a8a; }
        .link { text-align: center; margin-top: 25px; }
        .link a { color: #6a6a8a; text-decoration: none; font-size: 14px; }
        .link a:hover { color: #9a9aba; }
        .flash { padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 14px; }
        .flash-error { background: #ff444420; border: 1px solid #ff444440; color: #ff6666; }
        .flash-success { background: #00ff8820; border: 1px solid #00ff8840; color: #00ff88; }
        .hint { color: #555; font-size: 12px; margin-top: 5px; }
        .footer { text-align: center; color: #444; font-size: 12px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">◆</div>
                <h1>0XCHAPO</h1>
                <p>AI Cold Email Engine</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" placeholder="John Doe" required autofocus>

                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="you@company.com" required>

                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required minlength="8">
                <div class="hint">Minimum 8 characters</div>

                <label for="confirm">Confirm Password</label>
                <input type="password" name="confirm" id="confirm" placeholder="••••••••" required>

                <button type="submit" class="btn">Create Account</button>
            </form>

            <div class="link">
                <a href="/login">Already have an account? Sign in →</a>
            </div>

            <div class="footer">
                0xChapo Labs © 2024
            </div>
        </div>
    </div>
</body>
</html>
