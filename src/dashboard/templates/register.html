<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Cold Email Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 30px; }
        h1 { color: #00ff88; text-align: center; margin-bottom: 30px; }
        label { display: block; color: #888; margin-bottom: 5px; margin-top: 15px; }
        input { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; border-radius: 5px; color: #fff; font-size: 14px; }
        .btn { display: block; width: 100%; padding: 12px; background: #00ff88; color: #000; text-decoration: none; border-radius: 5px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; margin-top: 20px; text-align: center; }
        .btn:hover { background: #00cc6a; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #00ff88; text-decoration: none; }
        .flash { padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; }
        .flash-error { background: #ff444433; border: 1px solid #ff4444; color: #ff4444; }
        .flash-success { background: #00ff8833; border: 1px solid #00ff88; color: #00ff88; }
        .logo { text-align: center; font-size: 2em; margin-bottom: 20px; }
        .hint { color: #666; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">📧</div>
            <h1>Create Account</h1>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" placeholder="John Doe" required autofocus>

                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="you@example.com" required>

                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required minlength="8">
                <div class="hint">Minimum 8 characters</div>

                <label for="confirm">Confirm Password</label>
                <input type="password" name="confirm" id="confirm" placeholder="••••••••" required>

                <button type="submit" class="btn">Register</button>
            </form>

            <div class="link">
                <a href="/login">Already have an account? Login</a>
            </div>
        </div>
    </div>
</body>
</html>
