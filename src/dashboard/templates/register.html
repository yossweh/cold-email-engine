<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — 0xChapo</title>
    <link rel="icon" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #111118; border: 1px solid #1a1a1e; border-radius: 12px; padding: 35px; }
        .auth-header { text-align: center; margin-bottom: 35px; }
        .auth-header h1 { font-size: 2.2em; letter-spacing: 3px; margin-bottom: 10px; background: linear-gradient(135deg, #fff, #8888aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .auth-header p { color: #666; font-size: 0.95em; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #666; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 14px 16px; background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 8px; color: #fff; font-size: 14px; transition: border-color 0.2s; }
        .form-group input:focus { outline: none; border-color: #4a4a6a; }
        .btn-full { width: 100%; padding: 14px; }
        .btn-google { background: #fff; color: #333; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; width: 100%; padding: 14px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .btn-google:hover { background: #f5f5f5; border-color: #ccc; transform: translateY(-1px); }
        .btn-google img { width: 20px; height: 20px; }
        .auth-divider { display: flex; align-items: center; margin: 25px 0; }
        .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: #1a1a1a; }
        .auth-divider span { padding: 0 15px; color: #555; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .auth-footer { text-align: center; margin-top: 30px; color: #555; font-size: 13px; }
        .auth-footer a { color: #888; text-decoration: none; transition: color 0.2s; }
        .auth-footer a:hover { color: #aaa; }
        .otp-section { display: none; }
        .otp-section.visible { display: block; }
        .otp-row { display: flex; gap: 10px; }
        .otp-row input { flex: 1; }
        .btn-send { padding: 14px 20px; font-size: 13px; white-space: nowrap; background: linear-gradient(135deg, #1a3a1a, #2a5a2a); border: 1px solid #3a6a3a; color: #fff; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-send:hover { background: linear-gradient(135deg, #2a4a2a, #3a6a3a); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-verify { padding: 14px 20px; font-size: 13px; white-space: nowrap; background: linear-gradient(135deg, #2a2a4e, #3a3a6e); border: 1px solid #4a4a6a; color: #fff; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-verify:hover { background: linear-gradient(135deg, #3a3a5e, #4a4a7e); }
        .email-row { display: flex; gap: 10px; }
        .email-row input { flex: 1; }
        .status { font-size: 12px; margin-top: 8px; }
        .status.success { color: #00ff88; }
        .status.error { color: #ff6666; }
    </style>
</head>
<body>
    <div class="container-sm">
        <!-- Minimal Nav — Brand Only -->
        <nav class="nav" style="border-bottom: none; margin-bottom: 30px; justify-content: center;">
            <a href="/" class="nav-brand">
                <div class="nav-icon">◆</div>
                <span class="nav-title">0XCHAPO</span>
            </a>
        </nav>

        <div class="auth-card">
            <div class="auth-header">
                <p>Create your account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <!-- Google OAuth -->
            <a href="/auth/google" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Sign up with Google
            </a>

            <div class="auth-divider"><span>or sign up with email</span></div>

            <form method="POST" action="/register" id="registerForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" value="{{ name or '' }}" placeholder="Your name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <div class="email-row">
                        <input type="email" name="email" id="email" value="{{ email or '' }}" placeholder="you@example.com" required>
                        <button type="button" class="btn-send" id="sendOtpBtn" onclick="sendOTP()">Send Code</button>
                    </div>
                </div>

                <!-- OTP Verification -->
                <div class="form-group otp-section" id="otpSection">
                    <label>Verification Code</label>
                    <div class="otp-row">
                        <input type="text" id="otpCode" placeholder="Enter 6-digit code" maxlength="6" pattern="[0-9]{6}">
                        <button type="button" class="btn-verify" onclick="verifyOTP()">Verify</button>
                    </div>
                    <div class="status" id="otpStatus"></div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="At least 8 characters" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm" placeholder="Repeat password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login">Login</a>
            </div>
        </div>
    </div>

    <script>
        let otpVerified = false;
        let otpEmail = '';

        async function sendOTP() {
            const email = document.getElementById('email').value;
            if (!email) {
                showStatus('Please enter email first', 'error');
                return;
            }

            const btn = document.getElementById('sendOtpBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const response = await fetch('/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();

                if (data.success) {
                    document.getElementById('otpSection').classList.add('visible');
                    otpEmail = email;
                    showStatus('Code sent! Check your email.', 'success');
                    startResendCooldown();
                } else {
                    showStatus(data.error || 'Failed to send code', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Send Code';
                }
            } catch (err) {
                showStatus('Network error', 'error');
                btn.disabled = false;
                btn.textContent = 'Send Code';
            }
        }

        async function verifyOTP() {
            const code = document.getElementById('otpCode').value;
            if (!code || code.length !== 6) {
                showStatus('Enter 6-digit code', 'error');
                return;
            }

            try {
                const response = await fetch('/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: otpEmail, code })
                });
                const data = await response.json();

                if (data.success) {
                    otpVerified = true;
                    showStatus('✓ Email verified!', 'success');
                    document.getElementById('otpCode').disabled = true;
                    document.getElementById('submitBtn').textContent = 'Create Account ✓';
                } else {
                    showStatus(data.error || 'Invalid code', 'error');
                }
            } catch (err) {
                showStatus('Network error', 'error');
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('otpStatus');
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        function startResendCooldown() {
            const btn = document.getElementById('sendOtpBtn');
            let seconds = 60;
            btn.disabled = true;
            const interval = setInterval(() => {
                seconds--;
                btn.textContent = `${seconds}s`;
                if (seconds <= 0) {
                    clearInterval(interval);
                    btn.disabled = false;
                    btn.textContent = 'Resend';
                }
            }, 1000);
        }

        // Prevent form submission if OTP not verified
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const email = document.getElementById('email').value;
            if (!otpVerified || otpEmail !== email) {
                e.preventDefault();
                showStatus('Please verify your email first', 'error');
                return false;
            }
        });
    </script>
</body>
</html>
