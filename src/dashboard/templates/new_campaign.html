<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Campaign — 0xChapo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #1a1a1a; margin-bottom: 30px; }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-icon { width: 35px; height: 35px; background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid #4a4a6a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .nav-title { color: #e0e0e0; font-size: 1.2em; letter-spacing: 2px; }
        h1 { color: #e0e0e0; margin-bottom: 30px; font-weight: 300; font-size: 1.8em; }
        .card { background: #111; border: 1px solid #1a1a1a; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        label { display: block; color: #666; margin-bottom: 6px; margin-top: 20px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea, select { width: 100%; padding: 12px 15px; background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 8px; color: #fff; font-size: 14px; transition: border-color 0.2s; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #4a4a6a; }
        textarea { min-height: 120px; resize: vertical; }
        .checkbox-label { display: flex; align-items: center; gap: 10px; color: #888; font-size: 14px; cursor: pointer; }
        .checkbox-label input { width: auto; accent-color: #4a4a6a; }
        .btn { display: inline-block; padding: 14px 28px; background: linear-gradient(135deg, #2a2a3e, #3a3a5e); color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; border: 1px solid #4a4a6a; cursor: pointer; font-size: 15px; transition: all 0.2s; }
        .btn:hover { background: linear-gradient(135deg, #3a3a4e, #4a4a6e); border-color: #6a6a8a; }
        .btn-secondary { background: transparent; border-color: #333; color: #888; }
        .btn-secondary:hover { border-color: #555; color: #aaa; }
        .actions { display: flex; gap: 15px; margin-top: 30px; }
        .hint { color: #444; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/dashboard" class="nav-brand">
                <div class="nav-icon">◆</div>
                <span class="nav-title">0XCHAPO</span>
            </a>
        </nav>

        <h1>New Campaign</h1>

        <form method="POST">
            <div class="card">
                <label for="leads">Target Leads</label>
                <textarea name="leads" id="leads" placeholder="https://company1.com&#10;john@company2.com&#10;jane@example.com"></textarea>
                <div class="hint">One URL or email per line</div>

                <label for="product">Your Product / Service</label>
                <textarea name="product" id="product" placeholder="We build AI chatbots that increase conversion by 40%..." style="min-height: 80px;"></textarea>

                <div style="display: flex; gap: 20px;">
                    <div style="flex: 1;">
                        <label for="sender_name">Your Name</label>
                        <input type="text" name="sender_name" id="sender_name" placeholder="John Doe">
                    </div>
                    <div style="flex: 1;">
                        <label for="sender_company">Your Company</label>
                        <input type="text" name="sender_company" id="sender_company" placeholder="Acme Inc">
                    </div>
                </div>

                <label for="tone">Tone</label>
                <select name="tone" id="tone">
                    <option value="professional">Professional</option>
                    <option value="casual">Casual</option>
                    <option value="friendly">Friendly</option>
                    <option value="direct">Direct</option>
                </select>

                <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 12px;">
                    <label class="checkbox-label">
                        <input type="checkbox" name="verify_emails" checked>
                        Verify emails before sending
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="dry_run" checked>
                        Dry Run (preview only, don't send)
                    </label>
                </div>
            </div>

            <div class="actions">
                <a href="/dashboard" class="btn btn-secondary">← Back</a>
                <button type="submit" class="btn">Run Campaign</button>
            </div>
        </form>
    </div>
</body>
</html>
