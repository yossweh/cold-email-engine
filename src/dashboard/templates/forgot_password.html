<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — 0xChapo</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; }
        .auth-container { width: 100%; max-width: 420px; padding: 20px; }
        .auth-header { text-align: center; margin-bottom: 40px; }
        .auth-header h1 { font-size: 2.5em; letter-spacing: 3px; margin-bottom: 10px; color: #e0e0e0; }
        .auth-header p { color: #666; font-size: 0.95em; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #888; font-size: 13px; font-weight: 500; text-transform: none; letter-spacing: 0; }
        .form-group input { padding: 14px 16px; }
        .auth-flash { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .auth-flash.error { background: #2a1a1a; border: 1px solid #4a2a2a; color: #f87171; }
        .auth-flash.success { background: #1a2a1a; border: 1px solid #2a4a2a; color: #4ade80; }
        .auth-footer { text-align: center; margin-top: 30px; color: #555; font-size: 13px; }
        .auth-footer a { color: #888; }
        .auth-footer a:hover { color: #aaa; }
        .step-indicator { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .step-dot { width: 30px; height: 4px; border-radius: 2px; background: #1a1a1a; }
        .step-dot.active { background: #4a4a6a; }
        .btn-full { width: 100%; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <a href="/" style="text-decoration: none;">
                <h1>◆ 0XCHAPO</h1>
            </a>
            <p>Reset your password</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="auth-flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="step-indicator">
            <div class="step-dot {% if step == 'email' or not step %}active{% endif %}"></div>
            <div class="step-dot {% if step == 'otp' %}active{% endif %}"></div>
            <div class="step-dot {% if step == 'password' %}active{% endif %}"></div>
        </div>

        <div class="card">
            {% if step == 'otp' %}
            <form method="POST" action="/forgot-password">
                <input type="hidden" name="step" value="otp">
                <div class="form-group">
                    <label>Verification Code</label>
                    <input type="text" name="code" placeholder="Enter 6-digit code" maxlength="6" required autofocus>
                </div>
                <button type="submit" class="btn btn-full">Verify Code</button>
            </form>

            {% elif step == 'password' %}
            <form method="POST" action="/forgot-password">
                <input type="hidden" name="step" value="password">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="password" placeholder="At least 8 characters" required autofocus>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm" placeholder="Repeat password" required>
                </div>
                <button type="submit" class="btn btn-full">Reset Password</button>
            </form>

            {% else %}
            <form method="POST" action="/forgot-password">
                <input type="hidden" name="step" value="email">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@example.com" required autofocus>
                </div>
                <button type="submit" class="btn btn-full">Send Reset Code</button>
            </form>
            {% endif %}
        </div>

        <div class="auth-footer">
            <a href="/login">← Back to login</a>
        </div>
    </div>
</body>
</html>
